name: Merge or Die Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  trajectly:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Initialize Trajectly workspace
        run: python -m trajectly init

      - name: Run Trajectly gate
        id: trt
        continue-on-error: true
        uses: trajectly/trajectly-action@v1.0.2
        with:
          spec_glob: "specs/challenges/*.agent.yaml"
          project_root: "."
          comment_pr: "false"
          upload_artifacts: "true"

      - name: Shrink failing trace
        if: steps.trt.outcome == 'failure'
        run: python -m trajectly shrink || true

      - name: Generate PR comment payload
        if: always()
        run: |
          python -m arena.reporting.pr_comment \
            --report-path .trajectly/reports/latest.json \
            --output-markdown trajectly_pr_comment.md \
            --output-meta arena_pr_meta.json \
            --actor "${{ github.actor }}"

      - name: Render death card
        if: steps.trt.outcome == 'failure'
        run: python scripts/render_death_card.py --input trajectly_pr_comment.md --output death-card.png

      - name: Upload death card artifact
        if: steps.trt.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: death-cards
          path: death-card.png
          if-no-files-found: ignore

      - name: Publish step summary
        if: always()
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          report_path = Path(".trajectly/reports/latest.json")
          lines = []
          lines.append("## Merge or Die Summary")
          lines.append("")
          lines.append("| Spec | Status | Witness | Violation |")
          lines.append("|---|---|---:|---|")
          if report_path.exists():
              payload = json.loads(report_path.read_text(encoding="utf-8"))
              reports = payload.get("reports") or []
              for row in reports:
                  if not isinstance(row, dict):
                      continue
                  spec = str(row.get("spec", "unknown"))
                  status = str(row.get("trt_status", "n/a"))
                  witness = row.get("trt_witness_index", "n/a")
                  primary = row.get("trt_primary_violation") or {}
                  code = primary.get("code", "n/a") if isinstance(primary, dict) else "n/a"
                  if code == "n/a":
                      report_json = row.get("report_json")
                      if isinstance(report_json, str):
                          report_file = Path(report_json)
                          if report_file.exists():
                              report_payload = json.loads(report_file.read_text(encoding="utf-8"))
                              summary = report_payload.get("summary") if isinstance(report_payload, dict) else {}
                              if isinstance(summary, dict):
                                  classifications = summary.get("classifications") or {}
                                  if isinstance(classifications, dict) and classifications:
                                      if "budget_breach" in classifications:
                                          code = "BUDGET_BREACH"
                                      else:
                                          code = sorted(str(key).upper() for key in classifications.keys())[0]
                  lines.append(f"| `{spec}` | `{status}` | `{witness}` | `{code}` |")
          else:
              lines.append("| n/a | n/a | n/a | n/a |")

          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          summary_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Post PR comment
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- merge-or-die-report -->";
            const commentPath = "trajectly_pr_comment.md";
            if (!fs.existsSync(commentPath)) return;
            const body = fs.readFileSync(commentPath, "utf8").trim();
            if (!body) return;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Sync PR labels
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const metaPath = "arena_pr_meta.json";
            if (!fs.existsSync(metaPath)) return;
            const payload = JSON.parse(fs.readFileSync(metaPath, "utf8"));
            const labels = Array.isArray(payload.labels) ? payload.labels : [];
            if (!labels.length) return;
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels,
            });

      - name: Enforce gate
        if: steps.trt.outcome == 'failure'
        run: exit 1
