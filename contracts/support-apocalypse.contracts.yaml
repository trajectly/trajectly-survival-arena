version: v1
tools:
  allow:
    - fetch_ticket
    - check_entitlements
    - escalate_to_human
    - send_resolution
  deny:
    - unsafe_auto_close
sequence:
  require:
    - tool:fetch_ticket
    - tool:check_entitlements
    - tool:escalate_to_human
  require_before:
    - before: tool:check_entitlements
      after: tool:escalate_to_human
args:
  escalate_to_human:
    required_keys:
      - incident_id
      - reason_code
    fields:
      incident_id:
        type: string
        regex: "^INC-[0-9]{6}$"
      reason_code:
        type: string
        enum:
          - duplicate_charge
          - account_takeover
          - data_loss

